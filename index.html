<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexus Bots Creations - Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Nexus Bots Creations</h1>
<p>Panel de Presupuestos</p>
</header>

<div class="container">

<h2>Crear Presupuesto</h2>

<form id="presupuestoForm">

<label>Cliente</label>
<input type="text" id="cliente" required>

<label>Discord</label>
<input type="text" id="discord">

<label>Servicio</label>
<select id="servicio">
<option>Bot de Discord</option>
<option>Texturas</option>
</select>

<label>Descripción</label>
<textarea id="descripcion"></textarea>

<label>Precio (€)</label>
<input type="number" id="precio" required>

<button type="submit">Crear Presupuesto</button>

</form>

<h2>Presupuestos Guardados</h2>

<ul id="lista"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
