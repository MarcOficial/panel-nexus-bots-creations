<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus Bots Creations – Panel Oficial</title>

    <!-- Icono -->
    <link rel="icon" type="image/png" href="Nexus Bots Creations.png">

    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="Nexus Bots Creations.png" class="sidebar-logo">
            <h2>Nexus Bots</h2>
            <p class="tagline">Panel Oficial</p>
        </div>

        <nav class="menu">
            <button onclick="showSection('dashboard')"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
            <button onclick="showSection('nuevoPresupuesto')"><i class="fa-solid fa-file-invoice-dollar"></i> Nuevo Presupuesto</button>
            <button onclick="showSection('nuevaFactura')"><i class="fa-solid fa-file-invoice"></i> Nueva Factura</button>
            <button onclick="showSection('historial')"><i class="fa-solid fa-clock-rotate-left"></i> Historial</button>
            <button onclick="showSection('config')"><i class="fa-solid fa-gear"></i> Configuración</button>
        </nav>

        <footer class="sidebar-footer">
            <p>© <span id="year"></span> Nexus Bots Creations</p>
        </footer>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">
        <header class="topbar">
            <h1 id="pageTitle">Dashboard</h1>
            <div class="user-box">
                <i class="fa-solid fa-user-robot"></i>
                <span>Nexus Bots Creations</span>
            </div>
        </header>

        <section id="content" class="content-area">
            <!-- Contenido dinámico -->
        </section>
    </main>

</div>

<script src="script.js"></script>
</body>
</html>
